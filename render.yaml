services:
  - type: web
    name: smollm-api
    runtime: node

    buildCommand: |
      npm install

      test -s models/model.gguf

    startCommand: npm start
    envVars:
      - key: STREAM_CHUNK_DELAY_MS
        value: "0"
      - key: GENERATION_TIMEOUT_MS
        value: "120000"
      - key: LLAMA_GPU
        value: "false"
